name: Build SingBox Web Server

on:
  push:
    branches: [ "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # --- 1. 环境准备：Node.js & Pnpm v9 ---
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22 # 匹配你依赖中的 @tsconfig/node24

      - name: Install Pnpm
        uses: pnpm/action-setup@v4 # 升级到 v4 以支持 pnpm 9
        with:
          version: 9 # 必须是 9，因为你的 lockfile 是 9.0
          run_install: false

      # --- 2. 构建前端 ---
      - name: Build Frontend
        working-directory: ./frontend
        run: |
          # 使用 --frozen-lockfile 确保环境一致性，如果报错再换成 install
          pnpm install --frozen-lockfile
          pnpm build

      # --- 3. 编译 Go 后端 ---
      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache: true

      - name: Build Backend
        run: |
          go mod tidy
          # 针对 Linux 服务器环境构建
          GOOS=linux GOARCH=amd64 go build -ldflags="-s -w" -o singbox-web-server .

      # --- 4. 归档产物 ---
      - name: Upload Binary
        uses: actions/upload-artifact@v4
        with:
          name: server-bin
          path: singbox-web-server
