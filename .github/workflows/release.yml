name: Build SingBox Web Server

on:
  push:
    branches: [ "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # --- 1. 构建前端 ---
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 8

      - name: Build Frontend
        working-directory: ./frontend
        run: |
          pnpm install
          pnpm build

      # --- 2. 核心：处理前端产物 ---
      # 如果你的 Go 代码是通过 embed 引用 frontend/dist，这一步通常不需要额外操作。
      # 但如果你的 Go 代码在根目录找 dist，需要拷贝一下：
      # - name: Copy Frontend Dist to Root
      #   run: cp -r ./frontend/dist ./dist

      # --- 3. 编译 Go 后端 ---
      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22' # 建议用较新版本以支持更好的 embed
          cache: true

      - name: Build Backend
        run: |
          go mod tidy
          # 针对 Linux 服务器环境构建（一般网页端都跑在 Linux 上）
          GOOS=linux GOARCH=amd64 go build -ldflags="-s -w" -o singbox-web-server .

      # --- 4. 归档产物 ---
      - name: Upload Binary
        uses: actions/upload-artifact@v4
        with:
          name: server-bin
          path: singbox-web-server
